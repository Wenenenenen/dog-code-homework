<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看板任务管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>看板任务管理</h1>
            <div class="header-actions">
                <button id="reset-btn" class="btn btn-secondary">重置示例数据</button>
                <button id="theme-toggle" class="btn btn-icon">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>
        
        <main class="kanban-container">
            <div class="column" data-status="todo">
                <div class="column-header">
                    <h2 class="column-title">待办</h2>
                    <button class="add-card-inline-btn" data-status="todo">
                        <span class="add-icon">+</span> 添加任务
                    </button>
                </div>
                <div class="cards-container" data-status="todo"></div>
            </div>
            
            <div class="column" data-status="in-progress">
                <div class="column-header">
                    <h2 class="column-title">进行中</h2>
                    <button class="add-card-inline-btn" data-status="in-progress">
                        <span class="add-icon">+</span> 添加任务
                    </button>
                </div>
                <div class="cards-container" data-status="in-progress"></div>
            </div>
            
            <div class="column" data-status="done">
                <div class="column-header">
                    <h2 class="column-title">已完成</h2>
                    <button class="add-card-inline-btn" data-status="done">
                        <span class="add-icon">+</span> 添加任务
                    </button>
                </div>
                <div class="cards-container" data-status="done"></div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
